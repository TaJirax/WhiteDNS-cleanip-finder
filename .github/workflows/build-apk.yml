name: Build Android APK

on:
  workflow_dispatch:          # trigger manually from Actions tab
  push:
    tags:
      - 'v*'                  # auto-build only on version tags (e.g. v1.0.0)

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Go ───────────────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go.sum

      # ── 3. JDK 17 ───────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK + NDK ────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r26
        run: sdkmanager --install "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264

      # ── 5. gomobile ─────────────────────────────────────────────────────────
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: gomobile init
        run: gomobile init
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264

      # ── 6. Build whitescan.aar ──────────────────────────────────────────────
      - name: Build .aar (Go → Android library)
        run: |
          mkdir -p android/app/libs
          gomobile bind \
            -target=android/arm64,android/arm,android/amd64 \
            -androidapi 21 \
            -javapkg com.whitescan.engine \
            -o android/app/libs/whitescan.aar \
            ./mobile
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264

      # ── 7. Build APK via Gradle ─────────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      # ── 8. Upload APK artifact ──────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhiteDNS-${{ github.sha }}.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 9. GitHub Release (on version tags) ─────────────────────────────────
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "WhiteDNS ${{ github.ref_name }}"
          body: "APK build for ${{ github.ref_name }} (${{ github.sha }})"
          files: android/app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: false
