name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# GOTOOLCHAIN=local — stops Go from trying to download the non-existent Go 1.26
# declared in go.mod. Go 1.25 (installed below) is used for everything.
env:
  GOTOOLCHAIN: local

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Go 1.25 ──────────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      # ── 3. JDK 17 ───────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK (sets ANDROID_HOME in the environment) ────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. NDK r26 ──────────────────────────────────────────────────────────
      - name: Install NDK r26
        run: |
          sdkmanager --install "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      # ── 6. gomobile ─────────────────────────────────────────────────────────
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: gomobile init
        run: gomobile init

      # ── 7. Register gomobile as a tool dep (required by Go 1.25+) ───────────
      - name: Add gomobile tool dependency
        run: go get -tool golang.org/x/mobile/cmd/gobind

      # ── 8. Build whitescan.aar ──────────────────────────────────────────────
      - name: Build .aar (Go → Android library)
        run: |
          mkdir -p android/app/libs
          gomobile bind \
            -target=android/arm64,android/arm,android/amd64 \
            -androidapi 21 \
            -javapkg com.whitescan.engine \
            -o android/app/libs/whitescan.aar \
            ./mobile

      # ── 9. Gradle 8.7 + build APK ───────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      # ── 10. Upload APK artifact (30-day download in Actions tab) ─────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhiteDNS-${{ github.sha }}.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 11. GitHub Release (only on v* tags) ─────────────────────────────────
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "WhiteDNS ${{ github.ref_name }}"
          body: "APK build for ${{ github.ref_name }} (${{ github.sha }})"
          files: android/app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: false
